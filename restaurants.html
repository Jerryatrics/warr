<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Cuisine</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container page">
        <div class="card">
            <h1>Where should we eat?</h1>
            <p class="subtitle"></p>
            <div class="restaurants-grid">
                <div class="restaurant-card">
                    <img src="https://images.unsplash.com/photo-1579584425555-c3ce17fd4351?w=400&h=300&fit=crop" alt="Japanese Cuisine" class="restaurant-image">
                    <h3>🍜 Japanese Cuisine</h3>
                    
                    <a class="btn btn-restaurant" href="#">Select</a>
                </div>
                
                <div class="restaurant-card">
                    <img src="https://png.pngtree.com/thumb_back/fh260/background/20230516/pngtree-an-array-of-chinese-food-dishes-on-a-tray-image_2547699.jpg" alt="Chinese" class="restaurant-image">
                    <h3>🥡 Chinese</h3>
                    
                    <a class="btn btn-restaurant" href="#">Select</a>
                </div>
                
                <div class="restaurant-card">
                    <img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=400&h=300&fit=crop" alt="Italian" class="restaurant-image">
                    <h3>🍝 Italian</h3>
                    
                    <a class="btn btn-restaurant" href="#">Select</a>
                </div>
                
                <div class="restaurant-card">
                    <img src="https://res.klook.com/image/upload/c_crop,h_490,w_1024,x_0,y_233,z_0.4/w_750,h_469,c_fill,q_85/w_80,x_15,y_15,g_south_west,l_Klook_water_br_trans_yhcmh3/activities/yywsyd58hsd1rz8jdqfa.jpg" alt="Steak House" class="restaurant-image">
                    <h3>🥩 Steak House</h3>
                    
                    <a class="btn btn-restaurant" href="#">Select</a>
                </div>
                
                <div class="restaurant-card">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS_0OjMK2o0rYZR_plY2ZWAGrPKSnm4I2jBfQ&s" alt="Mediterranean" class="restaurant-image">
                    <h3>🫒 Mediterranean</h3>
                    
                    <a class="btn btn-restaurant" href="#">Select</a>
                </div>
                
                <div class="restaurant-card">
                    <img src="https://www.chowhound.com/img/gallery/15-korean-foods-to-try-at-least-once/l-intro-1766962688.jpg" alt="Korean" class="restaurant-image">
                    <h3>🌶️ Korean</h3>
                    
                    <a class="btn btn-restaurant" href="#">Select</a>
                </div>
            </div>
            <div class="actions">
                <a class="btn btn-yes" href="yes.html">Back</a>
                <a class="btn btn-no" href="index.html">Home</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const buttons = document.querySelectorAll('.btn-restaurant');
            const cuisines = ['Japanese', 'Chinese', 'Italian', 'Steak House', 'Mediterranean', 'Korean'];

            buttons.forEach((btn, idx) => {
                btn.addEventListener('click', async function(e) {
                    e.preventDefault();

                    const date = localStorage.getItem('selectedDate');
                    const time = localStorage.getItem('selectedTime');

                    if (!date || !time) {
                        alert('Please select a date and time first.');
                        window.location.href = 'date.html';
                        return;
                    }

                    const cuisine = cuisines[idx] || 'Unknown';

                    try {
                        // Use localhost for local testing, or replace with your deployed Vercel endpoint.
                        // Example: 'https://your-app.vercel.app/api/submit'
                        const SERVERLESS_ENDPOINT = 'https://warr-pi.vercel.app/api/submit';

                        const resp = await fetch(SERVERLESS_ENDPOINT, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ date, time, cuisine })
                        });

                        const data = await resp.json();
                        if (data && data.success) {
                            alert('');
                            // Optionally clear stored selection
                            // localStorage.removeItem('selectedDate');
                            // localStorage.removeItem('selectedTime');
                            window.location.href = 'index.html';
                        } else {
                            alert('Failed to send reservation: ' + (data.message || 'unknown'));
                        }
                    } catch (err) {
                        console.error(err);
                        alert('Error sending reservation. Is the server running?');
                    }
                });
            });
        });
    </script>

</body>
</html>
